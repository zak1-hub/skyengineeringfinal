<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Sky Engineering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #003057; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,.3); }
    .brand { color: #00b5e2; font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; }
    .btn-primary { background: #00b5e2; border: none; }
    .btn-primary:hover { background: #0099c5; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">🛰 Sky Engineering Portal</div>
    <h5 class="text-center mb-4 text-muted">Sign in to your account</h5>
    <form method="post">
      {% csrf_token %}
      {% if form.errors %}
        <div class="alert alert-danger">Invalid username or password.</div>
      {% endif %}
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" name="username" class="form-control" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 mt-2">Login</button>
    </form>
  </div>
</body>
</html>
