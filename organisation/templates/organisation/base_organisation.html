{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Organisation{% endblock %} | Sky Engineering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --sky-blue: #00b5e2;
      --sky-dark: #003057;
      --sky-light: #e8f7fc;
      --sidebar-w: 240px;
    }
    body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
    .sidebar {
      width: var(--sidebar-w);
      min-height: 100vh;
      background: var(--sky-dark);
      color: #fff;
      position: fixed;
      top: 0; left: 0;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }
    .sidebar .brand {
      padding: 1.25rem 1.5rem;
      font-size: 1.1rem;
      font-weight: 700;
      border-bottom: 1px solid rgba(255,255,255,.15);
      display: flex;
      align-items: center;
      gap: .6rem;
      color: var(--sky-blue);
      text-decoration: none;
    }
    .sidebar .nav-link {
      color: rgba(255,255,255,.8);
      padding: .65rem 1.5rem;
      font-size: .93rem;
      display: flex;
      align-items: center;
      gap: .6rem;
      transition: background .15s, color .15s;
      border-left: 3px solid transparent;
    }
    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(255,255,255,.08);
      color: #fff;
      border-left-color: var(--sky-blue);
    }
    .sidebar .nav-section {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.4);
      padding: 1rem 1.5rem .3rem;
    }
    .main-content {
      margin-left: var(--sidebar-w);
      padding: 2rem;
      min-height: 100vh;
    }
    .top-bar {
      background: #fff;
      border-radius: 12px;
      padding: .85rem 1.5rem;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }
    .top-bar h1 { font-size: 1.35rem; font-weight: 700; color: var(--sky-dark); margin: 0; }
    .card { border: none; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
  </style>
</head>
<body>

<nav class="sidebar">
  <a href="/" class="brand">
    <i class="bi bi-broadcast-pin"></i> Sky Engineering
  </a>

  <span class="nav-section">Main</span>
  <a href="/organisation/teams/" class="nav-link"><i class="bi bi-people"></i> Teams</a>
  <a href="/organisation/departments/" class="nav-link"><i class="bi bi-diagram-3"></i> Departments</a>
  <a href="/organisation/" class="nav-link"><i class="bi bi-building"></i> Organisation</a>
  <a href="/messages/" class="nav-link"><i class="bi bi-chat-dots"></i> Messages</a>

  <span class="nav-section">Messages</span>
  <a href="/messages/" class="nav-link"><i class="bi bi-inbox"></i> Inbox</a>
  <a href="/messages/compose/" class="nav-link"><i class="bi bi-pencil-square"></i> New Message</a>
  <a href="/messages/sent/" class="nav-link"><i class="bi bi-send"></i> Sent</a>
  <a href="/messages/drafts/" class="nav-link"><i class="bi bi-file-earmark-text"></i> Drafts</a>

  <span class="nav-section">Schedule</span>
  <a href="/schedule/" class="nav-link"><i class="bi bi-calendar2-check"></i> Upcoming</a>
  <a href="/schedule/weekly/" class="nav-link"><i class="bi bi-calendar3-week"></i> Weekly</a>
  <a href="/schedule/monthly/" class="nav-link"><i class="bi bi-calendar3"></i> Monthly</a>
  <a href="/schedule/new/" class="nav-link"><i class="bi bi-plus-circle"></i> New Meeting</a>

  <span class="nav-section">Reports</span>
  <a href="/reports/" class="nav-link"><i class="bi bi-file-earmark-bar-graph"></i> Reports</a>

  <div class="mt-auto p-3">
    <a href="/accounts/logout/" class="btn btn-sm btn-outline-light w-100">
      <i class="bi bi-box-arrow-right"></i> Logout
    </a>
  </div>
</nav>

<div class="main-content">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
